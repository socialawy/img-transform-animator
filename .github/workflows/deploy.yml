name: Deploy to GitHub Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

        # We can't actually pass the secret to the build if it's hardcoded in .env.local
        # But for Vite, we usually provide it at runtime or as an env var during build if needed.
        # Since the app uses it via VITE_GEMINI_API_KEY, we might want the user to provide it.
        # However, for a generic demo, we'll just build it.

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
