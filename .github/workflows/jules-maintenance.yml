name: Jules Maintenance

on:
  schedule:
    - cron: '30 */1 * * *' # Run hourly (offset by 30 mins)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  jules-maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@main
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          prompt: |
            Perform a routine maintenance sweep:
            1. Update npm packages to their latest stable versions.
            2. Fix any TypeScript errors or linting warnings.
            3. Refine the AI image transformation prompts or add a small new animation template.
            4. Verify the PWA/Service Worker configuration.
            
            Always create a clean, descriptive pull request for your changes.
